name: Run ClientMod CSS Server
on: workflow_dispatch

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
    - name: Install Dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt update
        sudo apt install lib32gcc-s1 lib32stdc++6 curl wget screen net-tools tmux unzip -y

    - name: Download and Install LinuxGSM
      run: |
        wget -O linuxgsm.sh https://linuxgsm.sh && chmod +x linuxgsm.sh && bash linuxgsm.sh cssserver
        # Скачиваем чистую базу игры v92 (ClientMod её отлично поддерживает)
        ./cssserver auto-install

    - name: Patch Server for ClientMod (No-Steam)
      run: |
        echo "Скачиваем оригинальный эмулятор No-Steam..."
        # Переходим в корневую папку сервера
        cd /home/runner/work/my-css-server/my-css-server/serverfiles/
        
        # Скачиваем рабочий и проверенный эмулятор RevEmu для Linux
        wget https://raw.githubusercontent.com/b0t7/revemu-linux/master/revemu_linux.zip -O revemu.zip || wget https://github.com/theAsher/revemu-linux-builds/releases/download/latest/revemu.zip -O revemu.zip
        
        # Распаковываем файлы эмулятора
        unzip -o revemu.zip
        rm revemu.zip
        
        # Даем права на запуск библиотекам эмулятора
        chmod +x bin/vstdlib_i486.so || true
        chmod +x cstrike/bin/server_srv.so || true

    - name: Get Public IP and Start Server
      run: |
        echo "=============================================="
        echo "ТВОЙ IP АДРЕС ДЛЯ КЛИЕНТ МОДА:"
        curl -s ifconfig.me
        echo ""
        echo "=============================================="
        
        # Запуск сервера
        ./cssserver start
        
        # Держим сервер включенным 6 часов
        sleep 6h
