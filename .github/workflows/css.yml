name: Run Automatic CSS Server
on: workflow_dispatch

jobs:
  run-server:
    runs-on: ubuntu-latest
    steps:
    - name: Install Dependencies
      run: |
        sudo dpkg --add-architecture i386
        sudo apt update
        sudo apt install lib32gcc-s1 lib32stdc++6 curl wget screen net-tools tmux -y

    - name: Download and Install LinuxGSM
      run: |
        wget -O linuxgsm.sh https://linuxgsm.sh && chmod +x linuxgsm.sh && bash linuxgsm.sh cssserver
        # Запускаем автоматическую установку без лишних вопросов
        ./cssserver auto-install

    - name: Get Public IP and Start Server
      run: |
        echo "=============================================="
        echo "ТВОЙ IP АДРЕС ДЛЯ ПОДКЛЮЧЕНИЯ К СЕРВЕРУ:"
        curl -s ifconfig.me
        echo ""
        echo "=============================================="
        # Запуск игрового сервера
        ./cssserver start
        # Оставляем контейнер активным, чтобы сервер работал
        sleep 6h
